name: Night Shift

on:
  schedule:
    # 10pm PST Tuesday and Thursday (06:00 UTC Wed/Fri)
    - cron: '0 6 * * 3,5'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max issues for night-shift (0 = unlimited)'
        required: false
        default: '0'
        type: string
      dry_run:
        description: 'Dry run — print queue and exit without making changes'
        type: boolean
        default: false
      skip_label_audit:
        description: 'Skip the label audit step'
        type: boolean
        default: false
      skip_night_shift:
        description: 'Skip the night shift step (run label audit only)'
        type: boolean
        default: false

jobs:
  label-audit:
    name: Label Audit
    if: ${{ inputs.skip_label_audit != true }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      issues: write

    steps:
      - name: Checkout ralph-burndown
        uses: actions/checkout@v4
        with:
          repository: smartwatermelon/ralph-burndown
          ref: v2.2.0
          path: ralph-burndown

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run label audit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
        working-directory: ralph-burndown
        run: |
          ARGS=(--config configs/projectinsomnia.yml --output stdout)
          [[ "${INPUT_DRY_RUN}" == "true" ]] && ARGS+=(--dry-run)
          uv run ralph-burndown label-audit "${ARGS[@]}"

  night-shift:
    name: Night Shift
    if: ${{ !cancelled() && inputs.skip_night_shift != true }}
    needs: [label-audit]
    runs-on: ubuntu-latest
    timeout-minutes: 480

    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout projectinsomnia
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: projectinsomnia

      - name: Checkout ralph-burndown
        uses: actions/checkout@v4
        with:
          repository: smartwatermelon/ralph-burndown
          ref: v2.2.0
          path: ralph-burndown

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install ralph-orchestrator
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download v2.8.1 -R mikeyobrien/ralph-orchestrator -p 'ralph-cli-x86_64-unknown-linux-gnu.tar.xz'
          tar xf ralph-cli-x86_64-unknown-linux-gnu.tar.xz
          mv ralph-cli-x86_64-unknown-linux-gnu/ralph /usr/local/bin/ralph
          chmod +x /usr/local/bin/ralph
          ralph --version

      - name: Configure git identity
        run: |
          git config --global user.name "night-shift[bot]"
          git config --global user.email "night-shift@nightowlstudio.us"

      - name: Install claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run night shift session
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          INPUT_LIMIT: ${{ inputs.limit }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
        working-directory: ralph-burndown
        run: |
          ARGS=(--config configs/projectinsomnia.yml)
          [[ -n "${INPUT_LIMIT}" && "${INPUT_LIMIT}" != "0" ]] && ARGS+=(--limit "${INPUT_LIMIT}")
          [[ "${INPUT_DRY_RUN}" == "true" ]] && ARGS+=(--dry-run)
          uv run ralph-burndown night-shift "${ARGS[@]}"
